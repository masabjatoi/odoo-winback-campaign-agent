version: '3.8'

services:
  win-back-cron:
    build: .
    container_name: win-back-agent-cron
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount persistent volume for the SQLite database
      - winback-db-volume:/app/data
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - odoo19-net

volumes:
  winback-db-volume:

networks:
  odoo19-net:
    external: true
